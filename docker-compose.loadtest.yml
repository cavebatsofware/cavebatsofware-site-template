services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    command: postgres -c max_connections=300 -c shared_buffers=256MB
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: personal_site
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loadtest

  # Application under test
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_FEATURES: loadtest
    environment:
      DATABASE_URL: postgres://testuser:testpass@postgres:5432/personal_site
      SITE_DOMAIN: example.com
      MIGRATE_DB: "true"
      RUST_LOG: info
      ACCESS_LOG_RETENTION_DAYS: "1"
      RATE_LIMIT_PER_MINUTE: "50"
      RATE_LIMIT_BLOCK_DURATION_SECS: "900"
      RATE_LIMIT_GRACE_PERIOD_SECS: "2"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "1.0"
          memory: 256M
    networks:
      - loadtest
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx reverse proxy for X-Forwarded-For header injection
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./loadtest/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - loadtest

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./loadtest/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - loadtest

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./loadtest/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./loadtest/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - loadtest

  # cAdvisor for container resource monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - loadtest

  # Load generator - legitimate traffic
  loadgen-legitimate:
    build:
      context: ./loadtest/generator
      dockerfile: Dockerfile
    environment:
      TARGET_URL: http://nginx
      TEST_SCENARIO: legitimate
      CONCURRENT_USERS: "100"
      REQUESTS_PER_USER: "50"
      DURATION_SECONDS: "300"
      RAMP_UP_SECONDS: "30"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - loadtest
    profiles:
      - load

  # Load generator - scanner simulation
  loadgen-scanner:
    build:
      context: ./loadtest/generator
      dockerfile: Dockerfile
    environment:
      TARGET_URL: http://nginx
      TEST_SCENARIO: scanner
      CONCURRENT_USERS: "50"
      REQUESTS_PER_USER: "200"
      DURATION_SECONDS: "240"
      RAMP_UP_SECONDS: "20"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - loadtest
    profiles:
      - load

  # Load generator - cache heavy
  loadgen-cache:
    build:
      context: ./loadtest/generator
      dockerfile: Dockerfile
    environment:
      TARGET_URL: http://nginx
      TEST_SCENARIO: cache
      CONCURRENT_USERS: "200"
      REQUESTS_PER_USER: "100"
      DURATION_SECONDS: "300"
      RAMP_UP_SECONDS: "30"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - loadtest
    profiles:
      - load

  # Load generator - extreme burst
  loadgen-burst:
    build:
      context: ./loadtest/generator
      dockerfile: Dockerfile
    environment:
      TARGET_URL: http://nginx
      TEST_SCENARIO: burst
      CONCURRENT_USERS: "1000"
      REQUESTS_PER_USER: "10"
      DURATION_SECONDS: "180"
      RAMP_UP_SECONDS: "10"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - loadtest
    profiles:
      - load

networks:
  loadtest:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
